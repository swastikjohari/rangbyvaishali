backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: /images

collections:
  - name: settings
    label: Site Settings
    files:
      - name: site
        label: Hero & Branding
        file: data/site.json
        format: json
        fields:
          - { label: Hero Video, name: hero_video, widget: file, allow_multiple: false, hint: "Upload an MP4 video. Shown as background in the hero section." }

  - name: gallery
    label: Gallery
    files:
      - name: paintings
        label: Paintings
        file: data/paintings.json
        format: json
        fields:
          - label: Paintings
            name: paintings
            widget: list
            summary: "{{fields.name}} — {{fields.price}}"
            fields:
              - { label: Painting Name, name: name, widget: string }
              - { label: Medium & Size, name: medium, widget: string, hint: "e.g. Acrylic on Canvas • 18×24 in" }
              - { label: Price, name: price, widget: string, hint: "e.g. ₹2,999" }
              - label: Images
                name: images
                widget: list
                min: 1
                summary: "{{fields.src}}"
                field: { label: Image, name: src, widget: image }
              - { label: Category, name: category, widget: select, options: [portrait, landscape, spiritual, abstract, floral] }
              - { label: Sold Out, name: sold, widget: boolean, default: false, hint: "Toggle on when this painting is sold" }
